name: Daily release summary
on:
  schedule:
    - cron: '0 9 * * *' # every day at 09:00 UTC
  workflow_dispatch:

jobs:
  summary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run release summary (example)
        run: |
          gh release list -R martinsvictor1910/observatorio-ia --limit 5
